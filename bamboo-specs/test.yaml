---
version: 2
plan:
  project-key: AJL
  key: AGTEXTENCODTEST
  name: text-encoding - test

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -ex

            # Fix mixed logs
            exec 2>&1

            export DOCKER_BUILDKIT=1

            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg BUILD_RUN_ID=${bamboo.buildNumber} \
              --target test-output \
              --output type=local,dest=output \
              .
    - script:
        interpreter: SHELL
        scripts:
          - |-
            if [ -f output/exit-code.txt ]; then
              exit $(cat output/exit-code.txt)
            fi
            echo "output/exit-code.txt not found"
            exit 1
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh"
  requirements:
    - adg-docker: "true"

branches:
  create: for-pull-request
  delete:
    after-deleted-days: '1'
    after-inactive-days: '5'
  link-to-jira: true

notifications:
  - events:
      - plan-status-changed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo

labels: []
other:
  concurrent-build-plugin: system-default
